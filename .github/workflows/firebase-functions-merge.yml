name: Deploy to Firebase Functions on merge

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'firebase.json'
      - '.github/workflows/firebase-functions-merge.yml'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: api

      - name: Typecheck
        run: npm run typecheck
        working-directory: api

      - name: Build
        run: npm run build
        working-directory: api

      - name: Create .env for Firebase Functions
        working-directory: api
        run: |
          cat <<EOF > .env
          NODE_ENV="production"
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          CSRF_SECRET=${{ secrets.CSRF_SECRET }}
          DATABASE_DIRECT_URL=${{ secrets.DATABASE_DIRECT_URL }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EOF

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@v15.7.0
        with:
          args: deploy --only functions --force
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEAM_503_2026 }}
          PROJECT_ID: team-503-2026
